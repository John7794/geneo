<!DOCTYPE html>
<html>
<head>
<style>
  .container {
    width: 300px;
    height: 200px;
    overflow-y: auto;
    padding: 16px;
    background: #f0f0f0;
    border: 1px solid black;
  }
  .axis {
    position: sticky;
    top: 0;
    height: 30px;
    background: red;
    z-index: 100;
  }
  .content {
    height: 500px;
    background: linear-gradient(blue, green);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="axis">Axis</div>
    <div class="content">Content</div>
  </div>
</body>
</html>
