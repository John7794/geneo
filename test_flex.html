<!DOCTYPE html>
<html>
<head>
<style>
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.col { display: flex; flex-direction: column; gap: 10px; background: #eee; }
.card { border: 1px solid #ccc; flex: 1; padding: 10px; }
</style>
</head>
<body>
<div class="grid">
  <div class="col">
    <div class="card">1 card</div>
  </div>
  <div class="col">
    <div class="card">2 cards</div>
    <div class="card">2 cards</div>
  </div>
  <div class="col">
    <div class="card">3 cards</div>
    <div class="card">3 cards</div>
    <div class="card">3 cards</div>
  </div>
</div>
</body>
</html>
